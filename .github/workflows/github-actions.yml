name: Lint and Test
run-name: Run Lint and Tests of ${{ github.repository }} 🚀
on: [push]

jobs:
  Lint:
    runs-on: ubuntu-latest

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install the Dependencies
        run: npm ci

      - name: Run Eslint
        run: npx eslint .