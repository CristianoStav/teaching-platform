name: Lint and Test
run-name: Run Lint and Tests of ${{ github.repository }} 🚀
on: 
  push:
    branches:
      - main

jobs:
  Lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install the Dependencies
        run: npm ci

      - name: Run Eslint
        run: npx eslint .
  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Tests
        run: npm run test