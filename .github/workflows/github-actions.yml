name: Lint and Test
run-name: Run Lint and Tests of ${{ github.repository }} 🚀
on: 
  push:
    branches:
      - main

jobs:
  Lint:
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup.yml

      - name: Run Eslint
        run: npx eslint .
  Test:
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup.yml

      - name: Run Tests
        run: npm run test