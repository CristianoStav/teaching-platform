name: Lint and Test
run-name: Run Lint and Tests of ${{ github.repository }} 🚀
on: 
  push:
    branches:
      - main

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/nodejs-setup

      - name: Run Eslint
        run: npx eslint .

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/nodejs-setup

      - name: Run Tests
        run: npm run test:cov

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/nodejs-setup

      - name: Build the project
        run: npm run build